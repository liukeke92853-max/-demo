<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>团长申请自动处理插件 Demo</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="browser-toolbar" aria-label="浏览器扩展区域模拟">
      <div class="address-bar"></div>
      <div class="toolbar-actions">
        <button class="toolbar-icon star-icon" type="button" aria-label="收藏"></button>
        <div class="extension-entry">
          <button class="extension-icon" type="button" aria-label="团长申请助手"></button>
          <section class="extension-card" aria-label="团长申请助手执行状态">
            <div class="extension-card-header">
              <strong>团长申请助手</strong>
              <span>运行中</span>
            </div>
            <dl class="extension-stats">
              <div>
                <dt>最新执行时间</dt>
                <dd id="extensionLatestTime">2026/05/21 09:00</dd>
              </div>
              <div>
                <dt>执行任务数量</dt>
                <dd id="extensionTaskCount">24</dd>
              </div>
              <div>
                <dt>执行频率</dt>
                <dd>6h一次</dd>
              </div>
            </dl>
          </section>
        </div>
        <span class="toolbar-divider"></span>
        <span class="profile-badge">柯</span>
        <button class="update-pill" type="button">重新启动即可更新</button>
        <button class="more-icon" type="button" aria-label="更多"></button>
      </div>
    </header>

    <main class="workspace">
      <section class="dialog-shell" aria-label="处理团长申请">
        <header class="dialog-header">
          <h1>处理团长申请</h1>
          <button class="ghost-icon" type="button" aria-label="关闭">×</button>
        </header>

        <nav class="tabs" aria-label="申请状态">
          <button class="tab is-active" type="button">待处理</button>
          <button class="tab" type="button">历史记录</button>
        </nav>

        <div class="notice">
          <span class="notice-icon">i</span>
          <span>团长提出的延长推广申请，若 3 日未审核，系统将默认拒绝</span>
        </div>

        <section class="filters" aria-label="页面原始筛选">
          <label>
            <span>商品信息</span>
            <input id="productSearch" type="search" placeholder="请输入商品名称或ID" />
          </label>
          <label class="leader-native">
            <span>团长信息</span>
            <input id="leaderSearch" type="search" placeholder="请输入团长名称或ID" />
          </label>
          <button id="pageQuery" class="primary-outline" type="button">查询</button>
          <button id="pageReset" class="plain-button" type="button">重置</button>
        </section>

        <section class="table-card" aria-label="团长申请列表">
          <div class="table-grid table-head">
            <strong>商品信息</strong>
            <strong>团长信息</strong>
            <strong>申请信息</strong>
            <strong>活动信息</strong>
            <strong>操作</strong>
          </div>
          <div id="requestTable" class="table-body"></div>
        </section>

        <footer class="pagination" aria-label="分页">
          <span id="pageTotal">共 0 条</span>
          <div class="pager-controls">
            <button id="prevPage" type="button" aria-label="上一页">‹</button>
            <div id="pageButtons" class="page-buttons"></div>
            <button id="nextPage" type="button" aria-label="下一页">›</button>
          </div>
        </footer>
      </section>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script src="./app.js"></script>
  </body>
</html>
